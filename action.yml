name: Labcast CI Alert
description: Notify labcast when a CI workflow fails

inputs:
  labcast-url:
    description: Labcast webhook bridge URL
    required: true
  labcast-api-key:
    description: Labcast API key
    required: true
  ts-oauth-client-id:
    description: Tailscale OAuth client ID
    required: true
  ts-oauth-secret:
    description: Tailscale OAuth secret
    required: true

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
      with:
        oauth-client-id: ${{ inputs.ts-oauth-client-id }}
        oauth-secret: ${{ inputs.ts-oauth-secret }}
        tags: tag:github-actions

    - name: Notify labcast
      shell: bash
      env:
        LABCAST_URL: ${{ inputs.labcast-url }}
        LABCAST_API_KEY: ${{ inputs.labcast-api-key }}
        GH_REPO: ${{ github.repository }}
        GH_WORKFLOW: ${{ github.workflow }}
        GH_BRANCH: ${{ github.ref_name }}
        GH_COMMIT: ${{ github.sha }}
        GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        PAYLOAD=$(jq -n \
          --arg repo "$GH_REPO" \
          --arg workflow "$GH_WORKFLOW" \
          --arg branch "$GH_BRANCH" \
          --arg commit "$GH_COMMIT" \
          --arg run_url "$GH_RUN_URL" \
          '{repo: $repo, workflow: $workflow, branch: $branch, commit: $commit, run_url: $run_url}')
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
          -H "Content-Type: application/json" \
          -H "X-Api-Key: $LABCAST_API_KEY" \
          -d "$PAYLOAD" \
          "$LABCAST_URL/publish/alerts/ci")
        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
          echo "::warning::Labcast notification failed with HTTP $HTTP_CODE"
        fi
